user www-data;
worker_processes auto;          # 1 vCPU -> 1 worker
pid /run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Security
    server_tokens off;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip (Cloudflare -> Origin compression)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;          # single client IP after real_ip restoration
    proxy_set_header X-Forwarded-Proto $forwarded_proto;    # preserve Cloudflare-set value
    proxy_set_header X-Forwarded-Host $host;                # for absolute URL generation, OAuth callbacks
    proxy_buffers 4 16k;
    proxy_buffer_size 8k;

    # X-Forwarded-Proto: preserve Cloudflare value, fall back to $scheme for local testing
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Rate limiting zones ($binary_remote_addr = real IP after set_real_ip_from)
    limit_req_zone $binary_remote_addr zone=auth:1m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:1m rate=2r/m;

    # Cloudflare real IP — placed in snippets/ to avoid conf.d/*.conf wildcard overlap
    include /etc/nginx/snippets/cloudflare-realip.conf;

    include /etc/nginx/conf.d/*.conf;
}
