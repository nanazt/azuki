# -- Block direct IP access --
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    return 444;
}

# -- HTTP -> HTTPS redirect --
# Primary HTTPS enforcement is handled at edge by Cloudflare Always Use HTTPS.
# UFW only allows Cloudflare IPs on 80/443, so direct access never reaches here.
# This block handles HTTP requests from Cloudflare or internal server testing.
server {
    listen 80;
    listen [::]:80;
    server_name AZUKI_DOMAIN;   # replaced by setup.sh
    return 301 https://$host$request_uri;
}

# -- Main server --
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name AZUKI_DOMAIN;   # replaced by setup.sh

    # SSL (Cloudflare Origin Certificate)
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Default body size (for API)
    client_max_body_size 1m;

    # -- WebSocket --
    # NOTE: setting proxy_set_header in location blocks breaks http-level inheritance -> specify all
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400s;
    }

    # -- Auth: rate limit only /auth/login --
    location = /auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # /auth/callback, /auth/logout have no rate limit (Discord redirect)
    location /auth/ {
        proxy_pass http://127.0.0.1:3000;
    }

    # -- Upload endpoint --
    location = /api/upload {
        client_max_body_size 100m;          # matches Cloudflare Free plan limit
        proxy_request_buffering off;        # don't buffer in nginx memory
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        limit_req zone=upload burst=1 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # -- Download endpoint --
    location ~ ^/api/download/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # -- API --
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # -- Media (thumbnails) --
    # axum serves /media/thumbnails via ServeDir (lib.rs:183)
    location /media/thumbnails/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # -- Vite build assets (hashed filenames -> long-term cache) --
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # -- SPA fallback --
    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
